services:
  - type: web
    name: heimdall
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: WEBHOOK_URL
        sync: false          # set manually after first deploy
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false          # Upstash Redis connection string
      - key: GEMINI_API_KEY
        sync: false          # from aistudio.google.com
